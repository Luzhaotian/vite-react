name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Publishes https://{owner}.github.io/ → /vite-react/ (needs repo {owner}.github.io).
  # Enable: Actions variable DEPLOY_USER_GITHUB_IO_REDIRECT=true, secret USER_SITE_PAGES_TOKEN (repo PAT).
  deploy-user-site-root:
    if: vars.DEPLOY_USER_GITHUB_IO_REDIRECT == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: user-github-io-root
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push redirect to ${{ github.repository_owner }}.github.io
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.USER_SITE_PAGES_TOKEN }}
          external_repository: ${{ github.repository_owner }}/${{ github.repository_owner }}.github.io
          publish_branch: main
          publish_dir: ./user-github-pages-root
          keep_files: true
